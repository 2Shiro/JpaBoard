server:
  port: 8080 # 서버 포트 (내장 톰캣이 바인딩할 포트)

  servlet:
    # 컨텍스트 패스(애플리케이션 기본 prefix)
    # - 모든 엔드포인트 URL 앞에 /example 이 붙음
    #   예) GET /hello  →  GET /example/hello
    context-path: /jpaboard

spring:
  application:
    name: jpaBoard # 애플리케이션 이름

  devtools:
    # 자동 재시작 기능
    # - 클래스패스 변경 시 앱을 재시작하는 기능
    # - 비활성화하면 재시작 안 함 (원하는 워크플로우에 따라 on/off)
    restart:
      enabled: false

  # DB 연결 설정 (DataSource)
  datasource:
    # JDBC 드라이버 클래스 (MySQL Connector/J 드라이버 지정)
    driver-class-name: com.mysql.cj.jdbc.Driver

    # JDBC URL
    # - 127.0.0.1:3306의 example DB로 연결
    url: jdbc:mysql://127.0.0.1:3306/jpaboard

    # DB 계정
    username: root

    # DB 비밀번호 (비워두면 비밀번호 없는 계정으로 접속 시도)
    password:

  # JPA 설정 (쿼리 로그 + DB 생성 규칙)
  jpa:
    # DB 스키마 생성/갱신 규칙 (개발에서 주로 사용)
    # - create: 실행 시 기존 테이블 삭제 후 재생성
    # - create-drop: 종료 시 테이블 삭제
    # - update: 변경분 반영(개발 편함, 운영 비권장)
    # - validate: 엔티티와 스키마 비교만(불일치 시 에러)
    # - none: 아무 것도 안 함(운영에서 주로)
    hibernate:
      ddl-auto: none

    show-sql: true              # 실행되는 SQL을 콘솔에 출력

    properties:
      hibernate:
        format_sql: true        # SQL 보기 좋게 포맷팅
